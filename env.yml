server:
  TYPE: http
  PORT: 8080
  URL: https://evolution-api-v2-1-1-5yjk.onrender.com
  DISABLE_MANAGER: false

cors:
  ORIGIN:
    - "*"
  METHODS:
    - POST
    - GET
    - PUT
    - DELETE
  CREDENTIALS: true

ssl_conf:
  PRIVKEY: ""
  FULLCHAIN: ""

store:
  CLEANING_INTERVAL: 7200
  MESSAGES: true
  MESSAGE_UP: false
  CONTACTS: true
  CHATS: true

clean_store:
  CLEANING_INTERVAL: 7200
  MESSAGES: true
  MESSAGE_UP: false
  CONTACTS: true
  CHATS: true

authentication:
  TYPE: apikey
  API_KEY:
    KEY: evolution-api
  EXPOSE_IN_FETCH_INSTANCES: true

qrcode:
  LIMIT: 30
  COLOR: "#198754"

websocket:
  ENABLED: false

rabbitmq:
  ENABLED: false

sqs:
  ENABLED: false

webhook:
  GLOBAL:
    URL: ""
    ENABLED: false
  EVENTS:
    APPLICATION_STARTUP: false
    QRCODE_UPDATED: true
    MESSAGES_SET: false
    MESSAGES_UPSERT: true
    MESSAGES_UPDATE: true
    SEND_MESSAGE: false
    CONTACTS_SET: false
    CONTACTS_UPSERT: false
    CONTACTS_UPDATE: false
    PRESENCE_UPDATE: false
    CHATS_SET: false
    CHATS_UPSERT: false
    CHATS_UPDATE: false
    CHATS_DELETE: false
    GROUPS_UPSERT: false
    GROUP_UPDATE: false
    GROUP_PARTICIPANTS_UPDATE: false
    CONNECTION_UPDATE: true
    CALL: false
    NEW_JWT_TOKEN: false

config_session_phone:
  CLIENT: Evolution API
  NAME: Chrome

log:
  LEVEL:
    - ERROR
    - WARN
    - DEBUG
    - INFO
    - LOG
    - VERBOSE
    - DARK
    - WEBHOOKS
  COLOR: true
  BAILEYS: error

del_instance: false

database:
  ENABLED: false
  CONNECTION:
    URI: ""
    DB_PREFIX_NAME: evolution

redis:
  ENABLED: false
  URI: ""
  PREFIX_KEY: evolution
