SERVER:
  TYPE: http
  PORT: 8080
  URL: https://evolution-api-deploy-3qcw.onrender.com
  DISABLE_MANAGER: false

CORS:
  ORIGIN:
    - "*"
  METHODS:
    - POST
    - GET
    - PUT
    - DELETE
  CREDENTIALS: true

SSL_CONF:
  PRIVKEY: ""
  FULLCHAIN: ""

STORE:
  CLEANING_INTERVAL: 7200
  MESSAGES: true
  MESSAGE_UP: false
  CONTACTS: true
  CHATS: true

CLEAN_STORE:
  CLEANING_INTERVAL: 7200
  MESSAGES: true
  MESSAGE_UP: false
  CONTACTS: true
  CHATS: true

AUTHENTICATION:
  TYPE: apikey
  API_KEY:
    KEY: evolution-api
  EXPOSE_IN_FETCH_INSTANCES: true

QRCODE:
  LIMIT: 30
  COLOR: "#198754"

WEBSOCKET:
  ENABLED: false

RABBITMQ:
  ENABLED: false

SQS:
  ENABLED: false

CHATWOOT:
  ENABLED: false

OPENAI:
  ENABLED: false

DIFY:
  ENABLED: false

TYPEBOT:
  ENABLED: false
  API_VERSION: latest

CHAMAAI:
  ENABLED: false
  BASE_URL: ""
  TOKEN: ""

WEBHOOK:
  GLOBAL:
    URL: ""
    ENABLED: false
  EVENTS:
    APPLICATION_STARTUP: false
    QRCODE_UPDATED: true
    MESSAGES_SET: false
    MESSAGES_UPSERT: true
    MESSAGES_UPDATE: true
    SEND_MESSAGE: false
    CONTACTS_SET: false
    CONTACTS_UPSERT: false
    CONTACTS_UPDATE: false
    PRESENCE_UPDATE: false
    CHATS_SET: false
    CHATS_UPSERT: false
    CHATS_UPDATE: false
    CHATS_DELETE: false
    GROUPS_UPSERT: false
    GROUP_UPDATE: false
    GROUP_PARTICIPANTS_UPDATE: false
    CONNECTION_UPDATE: true
    CALL: false
    NEW_JWT_TOKEN: false

CONFIG_SESSION_PHONE:
  CLIENT: Evolution API
  NAME: Chrome

LOG:
  LEVEL:
    - ERROR
    - WARN
    - DEBUG
    - INFO
    - LOG
    - VERBOSE
    - DARK
    - WEBHOOKS
  COLOR: true
  BAILEYS: error

DEL_INSTANCE: false

DATABASE:
  ENABLED: false
  CONNECTION:
    URI: ""
    DB_PREFIX_NAME: evolution

REDIS:
  ENABLED: false
  URI: ""
  PREFIX_KEY: evolution
